name: CI

on:
  push:
  pull_request:

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    services:
      postgres:
        image: postgis/postgis:16-3.4
        env:
          POSTGRES_USER: mobility
          POSTGRES_PASSWORD: mobility
          POSTGRES_DB: mobility
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U mobility -d mobility"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      TEST_POSTGRES_DSN: postgresql://mobility:mobility@localhost:5432/mobility

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17 (required by PySpark/Sedona)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache Ivy packages (Sedona/Delta jars)
        uses: actions/cache@v4
        with:
          path: ~/.ivy2
          key: ivy2-${{ runner.os }}-sedona-1.6.1-delta-3.2.0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Initialize Postgres schema
        run: PGPASSWORD=mobility psql -h localhost -U mobility -d mobility -f db/init/01_schema.sql

      - name: Lint with ruff
        run: ruff check .

      - name: Check formatting with black
        run: black --check .

      - name: Run tests
        run: pytest --cov=src --cov-report=term-missing
